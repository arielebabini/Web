<script>
    function showSection(sectionId) {
        if (sectionId === 'bookings') {
            const mainContent = document.querySelector('.main-page-section');
            if (mainContent) {
                mainContent.style.display = 'none'; // Nasconde il contenuto principale
            }

            const bookingsView = document.getElementById('bookingsSection');
            if (bookingsView) {
                bookingsView.style.display = 'block'; // Mostra la vista prenotazioni
                window.scrollTo(0, 0);
                if (typeof window.loadBookings === 'function') {
                    window.loadBookings();
                }
            }
        }
    }

    // Funzione per nascondere la vista prenotazioni e tornare alla pagina
    function hideBookingsView() {
        const bookingsView = document.getElementById('bookingsSection');
        if (bookingsView) {
            bookingsView.style.display = 'none'; // Nasconde la vista prenotazioni
        }

        const mainContent = document.querySelector('.main-page-section');
        if (mainContent) {
            mainContent.style.display = 'block'; // Mostra di nuovo il contenuto principale
        }
    }
</script>
